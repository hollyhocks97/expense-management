<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>予算管理</title>
<style>
  :root {
    --bg:#f7f6f2; --surface:#fff; --surface2:#f0efe9;
    --text:#1a1a18; --text2:#6b6a65; --text3:#9e9d98;
    --border:rgba(0,0,0,0.08);
    --green:#2d6a4f; --green-bg:#e8f4ee;
    --amber:#92400e; --amber-bg:#fef3c7;
    --red:#be123c; --red-bg:#ffe4e6;
    --blue:#1e40af; --blue-bg:#eff6ff;
    --r:16px; --rs:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;min-height:100vh;padding-bottom:88px}

  /* nav */
  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;transition:color .15s}
  .nav-btn.active{color:var(--green)}
  .nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

  /* pages */
  .page{display:none;padding:16px 16px 0}
  .page.active{display:block}

  /* header */
  .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .page-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
  .month-nav{display:flex;align-items:center;gap:8px}
  .month-nav button{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .month-nav button svg{width:16px;height:16px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .month-label{font-size:14px;font-weight:600;color:var(--text2);min-width:70px;text-align:center}

  /* 残高カード */
  .balance-card{background:var(--green);border-radius:var(--r);padding:22px 20px 18px;color:#fff;margin-bottom:12px}
  .balance-period{font-size:11px;color:rgba(255,255,255,.6);margin-bottom:8px}
  .balance-free-label{font-size:12px;color:rgba(255,255,255,.75);margin-bottom:2px}
  .balance-free-amount{font-size:42px;font-weight:700;letter-spacing:-2px;line-height:1;margin-bottom:14px}
  .balance-free-amount.warn{color:#fde68a}
  .balance-free-amount.danger{color:#fca5a5}
  .balance-divider{border:none;border-top:1px solid rgba(255,255,255,.15);margin:12px 0}
  .balance-row{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.7);margin-bottom:6px}
  .progress-track{height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;margin-top:4px}
  .progress-fill{height:100%;background:rgba(255,255,255,.8);border-radius:2px;transition:width .6s ease}
  .progress-fill.warn{background:#fde68a}
  .progress-fill.danger{background:#fca5a5}

  /* 固定費バッジ */
  .fixed-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,.85);margin-top:10px}

  /* サマリーグリッド */
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .sum-card{background:var(--surface);border-radius:var(--rs);padding:14px}
  .sum-card-label{font-size:11px;color:var(--text3);margin-bottom:4px}
  .sum-card-value{font-size:20px;font-weight:700;letter-spacing:-.5px}
  .sum-card-sub{font-size:11px;color:var(--text3);margin-top:2px}

  /* セクション */
  .section-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px}

  /* 支出リスト */
  .expense-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
  .expense-item{background:var(--surface);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:center;gap:12px}
  .expense-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--surface2)}
  .expense-info{flex:1;min-width:0}
  .expense-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .expense-meta{font-size:11px;color:var(--text3);margin-top:2px}
  .expense-amount{font-size:15px;font-weight:700;flex-shrink:0}
  .expense-del{background:none;border:none;cursor:pointer;padding:4px;color:var(--text3);opacity:.5;font-size:16px;line-height:1}
  .expense-del:active{opacity:1;color:var(--red)}

  /* 固定費リスト（ホーム） */
  .fixed-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
  .fixed-item{background:var(--surface);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:center;gap:12px}
  .fixed-badge-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--amber-bg)}
  .fixed-info{flex:1;min-width:0}
  .fixed-name{font-size:14px;font-weight:600}
  .fixed-cat{font-size:11px;color:var(--text3);margin-top:2px}
  .fixed-amount{font-size:15px;font-weight:700;color:var(--amber);flex-shrink:0}

  /* フォーム */
  .card{background:var(--surface);border-radius:var(--r);padding:20px;margin-bottom:16px}
  .form-group{margin-bottom:14px}
  .form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
  .form-input,.form-select{width:100%;padding:12px 14px;font-size:16px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);appearance:none;-webkit-appearance:none;font-family:inherit}
  .form-input:focus,.form-select:focus{outline:none;border-color:var(--green)}
  .sel-wrap{position:relative}
  .sel-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:12px}
  .btn{width:100%;padding:14px;font-size:16px;font-weight:600;border:none;border-radius:var(--rs);cursor:pointer;font-family:inherit;transition:opacity .15s;margin-top:4px}
  .btn-green{background:var(--green);color:#fff}
  .btn:active{opacity:.8}
  .btn:disabled{opacity:.45}

  /* 設定 */
  .settings-block{background:var(--surface);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
  .settings-sec-title{font-size:12px;font-weight:600;color:var(--text3);padding:14px 16px 6px;letter-spacing:.3px}
  .settings-row{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
  .settings-row:last-child{border-bottom:none}
  .settings-row-label{font-size:14px;font-weight:500}
  .settings-row-value{font-size:14px;color:var(--text2)}

  /* タグ */
  .tags-wrap{padding:10px 12px;display:flex;flex-wrap:wrap}
  .tag{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:500;margin:3px}
  .tag-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;line-height:1;padding:0 0 0 3px}
  .tag-add-row{display:flex;gap:8px;padding:8px 12px 12px}
  .tag-input{flex:1;padding:9px 12px;font-size:14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit}
  .tag-input:focus{outline:none;border-color:var(--green)}
  .tag-btn{padding:9px 16px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}

  /* 固定費設定リスト */
  .fixed-settings-item{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
  .fixed-settings-item:last-child{border-bottom:none}
  .fixed-settings-info{flex:1}
  .fixed-settings-name{font-size:14px;font-weight:600}
  .fixed-settings-meta{font-size:11px;color:var(--text3);margin-top:1px}
  .fixed-settings-amount{font-size:14px;font-weight:700;color:var(--amber);margin-right:8px}
  .icon-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;opacity:.5}
  .icon-del:active{opacity:1;color:var(--red)}

  /* misc */
  .loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}
  .empty{text-align:center;padding:28px 16px;color:var(--text3);font-size:14px}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200}
  .toast.show{opacity:1}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
  .pill-amber{background:var(--amber-bg);color:var(--amber)}

  @media(prefers-color-scheme:dark){
    :root{
      --bg:#111110;--surface:#1c1c1a;--surface2:#252523;
      --text:#f5f4f0;--text2:#9e9d98;--text3:#65645f;
      --border:rgba(255,255,255,.08);
      --green-bg:#0d2b1e;--amber-bg:#2d1f07;--red-bg:#2d0a16;--blue-bg:#0f172a;
    }
  }
</style>
</head>
<body>

<!-- ホーム -->
<div id="page-home" class="page active">
  <div class="page-header">
    <div class="page-title">予算</div>
    <div class="month-nav">
      <button id="prev-month"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="month-label" id="month-label">-</div>
      <button id="next-month"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
  </div>
  <div id="home-content"><div class="loading">読み込み中...</div></div>
</div>

<!-- 支出追加 -->
<div id="page-add" class="page">
  <div class="page-header"><div class="page-title">支出を追加</div></div>
  <div class="card">
    <div class="form-group">
      <label class="form-label" for="inp-date">日付</label>
      <input class="form-input" type="date" id="inp-date">
    </div>
    <div class="form-group">
      <label class="form-label" for="inp-amount">金額（円）</label>
      <input class="form-input" type="number" id="inp-amount" placeholder="0" inputmode="numeric">
    </div>
    <div class="form-group">
      <label class="form-label" for="inp-cat">カテゴリ</label>
      <div class="sel-wrap"><select class="form-select" id="inp-cat"><option value="">選択してください</option></select></div>
    </div>
    <div class="form-group">
      <label class="form-label" for="inp-memo">メモ（任意）</label>
      <input class="form-input" type="text" id="inp-memo" placeholder="例：スーパー">
    </div>
    <button class="btn btn-green" id="btn-add">追加する</button>
  </div>
</div>

<!-- 設定 -->
<div id="page-settings" class="page">
  <div class="page-header"><div class="page-title">設定</div></div>

  <div class="settings-sec-title">月予算</div>
  <div class="settings-block">
    <div class="settings-row">
      <span class="settings-row-label">現在の予算</span>
      <span class="settings-row-value" id="disp-budget">-</span>
    </div>
    <div class="settings-row">
      <span class="settings-row-label">固定費合計</span>
      <span class="settings-row-value" id="disp-fixed-total">-</span>
    </div>
    <div class="settings-row">
      <span class="settings-row-label">自由に使える予算</span>
      <span class="settings-row-value" id="disp-free-balance">-</span>
    </div>
  </div>
  <div class="card" style="margin-bottom:20px">
    <div class="form-group">
      <label class="form-label" for="inp-bgt-month">対象月</label>
      <input class="form-input" type="month" id="inp-bgt-month">
    </div>
    <div class="form-group">
      <label class="form-label" for="inp-bgt-amount">予算額（円）</label>
      <input class="form-input" type="number" id="inp-bgt-amount" placeholder="0" inputmode="numeric">
    </div>
    <button class="btn btn-green" id="btn-set-budget">予算を設定する</button>
  </div>

  <div class="settings-sec-title">固定費（天引き）</div>
  <div class="settings-block">
    <div id="fixed-list-settings"></div>
    <div style="padding:12px 16px 16px">
      <div class="form-group">
        <label class="form-label" for="inp-fix-name">名前</label>
        <input class="form-input" type="text" id="inp-fix-name" placeholder="例：家賃">
      </div>
      <div class="form-group">
        <label class="form-label" for="inp-fix-amount">金額（円）</label>
        <input class="form-input" type="number" id="inp-fix-amount" placeholder="0" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-label" for="inp-fix-cat">カテゴリ（任意）</label>
        <div class="sel-wrap"><select class="form-select" id="inp-fix-cat"><option value="">なし</option></select></div>
      </div>
      <button class="btn btn-green" id="btn-add-fixed" style="margin-top:0">固定費を追加する</button>
    </div>
  </div>

  <div class="settings-sec-title">カテゴリ</div>
  <div class="settings-block">
    <div class="tags-wrap" id="cat-tags"></div>
    <div class="tag-add-row">
      <input class="tag-input" type="text" id="inp-new-cat" placeholder="新しいカテゴリ">
      <button class="tag-btn" id="btn-add-cat">追加</button>
    </div>
  </div>
</div>

<!-- ナビ -->
<nav class="nav">
  <button class="nav-btn active" data-page="home">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    ホーム
  </button>
  <button class="nav-btn" data-page="add">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    追加
  </button>
  <button class="nav-btn" data-page="settings">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    設定
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const GAS = "https://script.google.com/macros/s/AKfycbxfmzfFP5nlrGQhiRtQUR_IEgygPM6_ydf8Qompektk2k6gc4pM3zu6fuOe6-NOQLZCOg/exec";

let currentMonth = cycleKey(new Date());
let categories = [];

// ---- utils ----
function cycleKey(d) {
  if (d.getDate() >= 16) return `${d.getFullYear()}/${pad(d.getMonth()+1)}`;
  const p = new Date(d.getFullYear(), d.getMonth()-1, 1);
  return `${p.getFullYear()}/${pad(p.getMonth()+1)}`;
}
function pad(n){ return String(n).padStart(2,'0'); }
function yen(n){ return '¥' + Number(n).toLocaleString('ja-JP'); }
function periodStr(key) {
  const [y,m] = key.split('/').map(Number);
  const ey = m===12?y+1:y, em = m===12?1:m+1;
  return `${y}/${pad(m)}/16 〜 ${ey}/${pad(em)}/15`;
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}
const EMOJI = {'食費':'🛒','交通費':'🚃','外食':'🍜','日用品':'🧴','娯楽':'🎮','医療':'💊','光熱費':'💡','通信費':'📱','衣類':'👗','住居':'🏠','保険':'🛡️','教育':'📚','その他':'📦'};
function icon(c){ return EMOJI[c]||'💴'; }
function daysElapsed(key) {
  const [y,m] = key.split('/').map(Number);
  return Math.max(1, Math.ceil((new Date()-new Date(y,m-1,16))/(86400000)));
}

// ---- API ----
async function get(params){ return (await fetch(`${GAS}?${new URLSearchParams(params)}`)).json(); }
async function post(body){ return (await fetch(GAS,{method:'POST',body:JSON.stringify(body)})).json(); }

// ---- ホーム ----
async function loadHome() {
  document.getElementById('month-label').textContent = currentMonth.replace('/','/');
  const el = document.getElementById('home-content');
  el.innerHTML = '<div class="loading">読み込み中...</div>';
  const [sum, expData] = await Promise.all([
    get({action:'getSummary', month:currentMonth}),
    get({action:'getExpenses', month:currentMonth}),
  ]);
  const {budget,fixedTotal,fixedList=[],freeBalance,spent,remaining,ratio} = sum;
  const expenses = expData.expenses||[];
  const r2 = Math.min(ratio,100);
  const cls = ratio>=100?'danger':ratio>=80?'warn':'';
  const dailyAvg = expenses.length>0 ? yen(Math.round(spent/daysElapsed(currentMonth))) : '-';

  el.innerHTML = `
    <div class="balance-card">
      <div class="balance-period">${periodStr(currentMonth)}</div>
      <div class="balance-free-label">自由に使える残り</div>
      <div class="balance-free-amount ${cls}">${yen(remaining)}</div>
      <div class="fixed-badge">🔒 固定費 ${yen(fixedTotal)} 天引き済み</div>
      <hr class="balance-divider">
      <div class="balance-row"><span>変動支出 ${yen(spent)}</span><span>自由予算 ${yen(freeBalance)}</span></div>
      <div class="balance-row"><span>変動使用率 ${ratio}%</span></div>
      <div class="progress-track"><div class="progress-fill ${cls}" style="width:${r2}%"></div></div>
    </div>
    <div class="summary-grid">
      <div class="sum-card">
        <div class="sum-card-label">月予算</div>
        <div class="sum-card-value" style="font-size:16px">${yen(budget)}</div>
        <div class="sum-card-sub">固定費 ${yen(fixedTotal)}</div>
      </div>
      <div class="sum-card">
        <div class="sum-card-label">1日平均</div>
        <div class="sum-card-value" style="font-size:16px">${dailyAvg}</div>
        <div class="sum-card-sub">${expenses.length}件の支出</div>
      </div>
    </div>
    ${fixedList.length>0?`
    <div class="section-title">固定費（今月の天引き）</div>
    <div class="fixed-list">
      ${fixedList.map(f=>`
        <div class="fixed-item">
          <div class="fixed-badge-icon">${icon(f.category)}</div>
          <div class="fixed-info">
            <div class="fixed-name">${f.name}</div>
            <div class="fixed-cat">${f.category||'カテゴリなし'}</div>
          </div>
          <div class="fixed-amount">${yen(f.amount)}</div>
        </div>`).join('')}
    </div>`:''}
    <div class="section-title">最近の支出</div>
    <div class="expense-list">
      ${expenses.length===0?'<div class="empty">変動支出がまだありません</div>':
        expenses.slice(0,8).map(e=>`
          <div class="expense-item">
            <div class="expense-icon">${icon(e.category)}</div>
            <div class="expense-info">
              <div class="expense-name">${e.memo||e.category||'支出'}</div>
              <div class="expense-meta">${e.date.slice(5).replace('-','/')} ・ ${e.category}</div>
            </div>
            <div class="expense-amount">${yen(e.amount)}</div>
            <button class="expense-del" data-id="${e.id}">✕</button>
          </div>`).join('')}
    </div>
  `;
  el.querySelectorAll('.expense-del').forEach(btn=>{
    btn.addEventListener('click', async()=>{
      if(!confirm('この支出を削除しますか？'))return;
      await post({action:'deleteExpense',id:btn.dataset.id});
      toast('削除しました'); loadHome();
    });
  });
}

// ---- カテゴリ ----
async function loadCategories() {
  const data = await get({action:'getCategories'});
  categories = data.categories||[];
  // セレクト更新（支出追加・固定費追加）
  ['inp-cat','inp-fix-cat'].forEach(id=>{
    const sel = document.getElementById(id);
    if(!sel)return;
    const def = id==='inp-fix-cat'?'<option value="">なし</option>':'<option value="">選択してください</option>';
    sel.innerHTML = def + categories.map(c=>`<option value="${c}">${c}</option>`).join('');
  });
  // タグ
  const wrap = document.getElementById('cat-tags');
  if(!wrap)return;
  wrap.innerHTML = categories.length===0
    ? '<div style="padding:8px;font-size:13px;color:var(--text3)">カテゴリがありません</div>'
    : categories.map(c=>`<span class="tag">${icon(c)} ${c}<button class="tag-del" data-name="${c}">×</button></span>`).join('');
  wrap.querySelectorAll('.tag-del').forEach(btn=>{
    btn.addEventListener('click', async()=>{
      if(!confirm(`「${btn.dataset.name}」を削除しますか？`))return;
      await post({action:'deleteCategory',name:btn.dataset.name});
      toast('削除しました'); loadCategories();
    });
  });
}

// ---- 固定費（設定） ----
async function loadFixedSettings() {
  const data = await get({action:'getFixedCosts'});
  const list = data.fixedCosts||[];
  const wrap = document.getElementById('fixed-list-settings');
  if(!wrap)return;
  wrap.innerHTML = list.length===0
    ? '<div class="empty" style="padding:16px">固定費が登録されていません</div>'
    : list.map(f=>`
        <div class="fixed-settings-item">
          <div class="fixed-settings-info">
            <div class="fixed-settings-name">${f.name}</div>
            <div class="fixed-settings-meta">${f.category||'カテゴリなし'}</div>
          </div>
          <div class="fixed-settings-amount">${yen(f.amount)}</div>
          <button class="icon-del" data-id="${f.id}">×</button>
        </div>`).join('');
  wrap.querySelectorAll('.icon-del').forEach(btn=>{
    btn.addEventListener('click', async()=>{
      if(!confirm('この固定費を削除しますか？'))return;
      await post({action:'deleteFixedCost',id:btn.dataset.id});
      toast('削除しました'); loadFixedSettings(); loadSettingsPage();
    });
  });
}

// ---- 設定ページ ----
async function loadSettingsPage() {
  const sum = await get({action:'getSummary',month:currentMonth});
  document.getElementById('disp-budget').textContent      = yen(sum.budget||0);
  document.getElementById('disp-fixed-total').textContent = yen(sum.fixedTotal||0);
  document.getElementById('disp-free-balance').textContent= yen(sum.freeBalance||0);
  const [y,m] = currentMonth.split('/');
  document.getElementById('inp-bgt-month').value = `${y}-${m}`;
  loadCategories();
  loadFixedSettings();
}

// ---- ナビ ----
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const p = btn.dataset.page;
    document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(`page-${p}`).classList.add('active');
    btn.classList.add('active');
    if(p==='home') loadHome();
    if(p==='settings') loadSettingsPage();
  });
});

// ---- 月移動 ----
document.getElementById('prev-month').addEventListener('click',()=>{
  const [y,m]=currentMonth.split('/').map(Number);
  const d=new Date(y,m-2,1);
  currentMonth=`${d.getFullYear()}/${pad(d.getMonth()+1)}`;
  loadHome();
});
document.getElementById('next-month').addEventListener('click',()=>{
  const [y,m]=currentMonth.split('/').map(Number);
  const d=new Date(y,m,1);
  currentMonth=`${d.getFullYear()}/${pad(d.getMonth()+1)}`;
  loadHome();
});

// ---- 支出追加 ----
document.getElementById('inp-date').value = new Date().toISOString().slice(0,10);
document.getElementById('btn-add').addEventListener('click', async()=>{
  const date=document.getElementById('inp-date').value;
  const amount=document.getElementById('inp-amount').value;
  const category=document.getElementById('inp-cat').value;
  const memo=document.getElementById('inp-memo').value;
  if(!date||!amount||amount<=0){toast('日付と金額を入力してください');return;}
  const btn=document.getElementById('btn-add');
  btn.disabled=true; btn.textContent='追加中...';
  await post({action:'addExpense',date,amount:Number(amount),category,memo});
  btn.disabled=false; btn.textContent='追加する';
  document.getElementById('inp-amount').value='';
  document.getElementById('inp-memo').value='';
  toast('追加しました！');
});

// ---- 予算設定 ----
document.getElementById('btn-set-budget').addEventListener('click', async()=>{
  const mv=document.getElementById('inp-bgt-month').value;
  const amt=document.getElementById('inp-bgt-amount').value;
  if(!mv||!amt||amt<=0){toast('月と金額を入力してください');return;}
  const btn=document.getElementById('btn-set-budget');
  btn.disabled=true;
  await post({action:'setBudget',month:mv.replace('-','/'),amount:Number(amt)});
  btn.disabled=false;
  document.getElementById('inp-bgt-amount').value='';
  toast('予算を設定しました！'); loadSettingsPage();
});

// ---- 固定費追加 ----
document.getElementById('btn-add-fixed').addEventListener('click', async()=>{
  const name=document.getElementById('inp-fix-name').value.trim();
  const amount=document.getElementById('inp-fix-amount').value;
  const category=document.getElementById('inp-fix-cat').value;
  if(!name||!amount||amount<=0){toast('名前と金額を入力してください');return;}
  const btn=document.getElementById('btn-add-fixed');
  btn.disabled=true; btn.textContent='追加中...';
  await post({action:'addFixedCost',name,amount:Number(amount),category});
  btn.disabled=false; btn.textContent='固定費を追加する';
  document.getElementById('inp-fix-name').value='';
  document.getElementById('inp-fix-amount').value='';
  toast('固定費を追加しました！'); loadFixedSettings(); loadSettingsPage();
});

// ---- カテゴリ追加 ----
document.getElementById('btn-add-cat').addEventListener('click', async()=>{
  const name=document.getElementById('inp-new-cat').value.trim();
  if(!name)return;
  const res=await post({action:'addCategory',name});
  if(res.error){toast(res.error==='already exists'?'既に存在します':'エラーが発生しました');return;}
  document.getElementById('inp-new-cat').value='';
  toast('追加しました！'); loadCategories();
});

// ---- 初期化 ----
loadHome();
loadCategories();
</script>
</body>
</html>
